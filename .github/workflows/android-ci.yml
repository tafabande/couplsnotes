name: Android NoteShare CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'

permissions:
  contents: write

jobs:
  lint-format-test:
    name: Code Quality and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Code Formatting Check (EditorConfig)
        uses: editorconfig-checker/action-editorconfig-checker@v2

      - name: Run Static Analysis (Android Lint)
        run: ./gradlew lintDebug

      - name: Run Local Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Repository Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'

  build-deploy:
    name: Build and Deploy APK
    needs: lint-format-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug & Release APKs
        run: |
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      # Deploy to Firebase App Distribution (Automated pre-deployment/distribution)
      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-App-Distribution-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_CLI_TOKEN }}
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk
